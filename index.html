<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soul Radar iOS</title>
    <style>
        :root { --neon: #00ff41; --love: #ff0055; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        #radar { position: relative; width: 280px; height: 280px; border: 4px solid currentColor; border-radius: 50%; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        #needle { position: absolute; width: 10px; height: 130px; background: currentColor; bottom: 50%; left: calc(50% - 5px); transform-origin: bottom center; z-index: 10; }
        #deg { font-size: 5rem; font-weight: bold; margin: 10px; text-shadow: 0 0 10px currentColor; }
        body.love-mode { color: var(--love); background: #1a0005; }
        .heart { position: absolute; pointer-events: none; font-size: 90px; text-shadow: 0 0 30px var(--love); z-index: 100; animation: explode 1s forwards cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        @keyframes explode { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(2.5); opacity: 0; } }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        button { padding: 30px 40px; background: var(--neon); color: #000; font-size: 1.6rem; font-weight: bold; border: none; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body id="main-body" onclick="lockTarget()">

    <div id="overlay">
        <button onclick="unlockSafari()">AVVIA RADAR (iOS)</button>
    </div>

    <div id="deg">000°</div>
    <div id="radar"><div id="needle"></div></div>
    <div id="status" style="margin-top: 20px; letter-spacing: 3px;">SCANNING...</div>

    <script>
        let audioCtx, isLocked = false, intensity = 0, nextBeep = 0, currentAngle = 0;

        function unlockSafari() {
            // 1. Inizializza Audio
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 2. Richiedi Permessi Sensori (Solo iOS richiede questo passo)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response == 'granted') {
                            startTracking();
                        } else {
                            alert("Senza permessi la bussola non funzionerà!");
                        }
                    })
                    .catch(console.error);
            } else {
                // Per browser che non richiedono permessi (o se sei su Android)
                startTracking();
            }
        }

        function startTracking() {
            document.getElementById('overlay').style.display = 'none';

            window.addEventListener('deviceorientation', (e) => {
                // webkitCompassHeading è la chiave magica per Safari
                let heading = e.webkitCompassHeading || e.alpha;

                if (heading !== null && !isLocked) {
                    currentAngle = heading;
                    document.getElementById('needle').style.transform = `rotate(${currentAngle}deg)`;
                    document.getElementById('deg').innerText = Math.floor(currentAngle).toString().padStart(3, '0') + "°";
                }

                // Inclinazione (Beta) per far battere il cuore e generare cuori
                let beta = Math.abs(e.beta || 0);
                intensity = Math.max(0, Math.min(100, (beta - 20) * 3));
            }, true);

            requestAnimationFrame(engine);
        }

        function lockTarget() {
            if (!audioCtx || isLocked) return;
            isLocked = true;
            document.getElementById('main-body').classList.add('love-mode');
            document.getElementById('status').innerText = "TARGET LOCKED";
        }

        function engine() {
            let now = audioCtx ? audioCtx.currentTime : 0;
            if (isLocked && intensity > 10 && now > nextBeep) {
                playBeep(now);
                nextBeep = now + (0.7 - (intensity / 100) * 0.65);
                
                // Genera cuori giganti proporzionali all'intensità
                let count = Math.floor(intensity / 15);
                for(let i=0; i<count; i++) spawnHeart();
            }
            requestAnimationFrame(engine);
        }

        function spawnHeart() {
            const h = document.createElement('div');
            h.className = 'heart'; h.innerHTML = '❤';
            h.style.left = '50%'; h.style.top = '50%';
            h.style.setProperty('--tx', (Math.random() * 800 - 400) + 'px');
            h.style.setProperty('--ty', (Math.random() * -1000 + 200) + 'px');
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }

        function playBeep(t) {
            let osc = audioCtx.createOscillator(), g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(800 + (intensity * 4), t);
            g.gain.setValueAtTime(0.1, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
            osc.start(t); osc.stop(t + 0.1);
        }
    </script>
</body>
</html>
