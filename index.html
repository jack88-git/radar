<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bussola Pura</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #radar { position: relative; width: 300px; height: 300px; border: 4px solid currentColor; border-radius: 50%; }
        #needle { position: absolute; width: 8px; height: 140px; background: currentColor; bottom: 50%; left: calc(50% - 4px); transform-origin: bottom center; transition: transform 0.1s linear; }
        #deg { font-size: 5rem; font-weight: bold; margin-bottom: 10px; }
        body.love { color: #ff0055; background: #1a0005; }
        .heart { position: absolute; pointer-events: none; font-size: 80px; text-shadow: 0 0 30px #ff0055; animation: exp 1s forwards; z-index: 100; }
        @keyframes exp { 0% { transform: translate(-50%,-50%) scale(0); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(2.5); opacity: 0; } }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        button { padding: 30px; background: none; border: 4px solid #00ff41; color: #00ff41; font-size: 1.5rem; font-family: monospace; cursor: pointer; }
    </style>
</head>
<body id="b">

    <div id="overlay">
        <button onclick="attiva()">ATTIVA BUSSOLA</button>
    </div>

    <div id="deg">000°</div>
    <div id="radar"><div id="needle"></div></div>
    <div id="info" style="margin-top: 20px;">PUNTA IL TARGET</div>

<script>
    let isLocked = false, angle = 0, audioCtx, nextBeep = 0, intensity = 0;

    async function attiva() {
        // Blocco Audio
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Gestione Permessi iOS
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') sbloccaBussola();
        } else {
            sbloccaBussola();
        }
        document.getElementById('overlay').style.display = 'none';
    }

    function sbloccaBussola() {
        // Usiamo l'evento ABSOLUTE per Android, quello standard per iOS
        const evName = ('ondeviceorientationabsolute' in window) ? 'deviceorientationabsolute' : 'deviceorientation';
        
        window.addEventListener(evName, (e) => {
            let heading = 0;

            if (e.webkitCompassHeading) {
                // Caso iOS
                heading = e.webkitCompassHeading;
            } else if (e.alpha !== null) {
                // Caso Android: usiamo il magnetometro assoluto
                heading = e.absolute ? e.alpha : 360 - e.alpha;
            }

            if (!isLocked) {
                angle = heading;
                document.getElementById('needle').style.transform = `rotate(${angle}deg)`;
                document.getElementById('deg').innerText = Math.floor(angle).toString().padStart(3, '0') + "°";
            }

            // Inclinazione per Beep e Cuori
            let pitch = Math.abs(e.beta || 0);
            intensity = Math.max(0, Math.min(100, (pitch - 20) * 3));
        }, true);

        requestAnimationFrame(loop);
    }

    document.body.onclick = () => {
        if (!audioCtx || isLocked) return;
        isLocked = true;
        document.getElementById('b').className = 'love';
        document.getElementById('info').innerText = "TARGET BLOCCATO";
    };

    function loop() {
        let now = audioCtx ? audioCtx.currentTime : 0;
        if (isLocked && intensity > 10 && now > nextBeep) {
            playBeep(now);
            nextBeep = now + (0.7 - (intensity / 100) * 0.65);
            // Spara cuori giganti
            for (let i = 0; i < Math.floor(intensity / 15); i++) {
                const h = document.createElement('div');
                h.className = 'heart'; h.innerHTML = '❤';
                h.style.left = '50%'; h.style.top = '50%';
                h.style.setProperty('--tx', (Math.random() * 800 - 400) + 'px');
                h.style.setProperty('--ty', (Math.random() * -800 + 200) + 'px');
                document.getElementById('b').appendChild(h);
                setTimeout(() => h.remove(), 1000);
            }
        }
        requestAnimationFrame(loop);
    }

    function playBeep(t) {
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square'; o.frequency.setValueAtTime(850 + (intensity * 4), t);
        g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        o.start(t); o.stop(t + 0.1);
    }
</script>
</body>
</html>
