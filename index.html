<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soul Target Radar</title>
    <style>
        :root { --love-pink: #ff0055; --love-glow: rgba(255, 0, 85, 0.6); --bg-black: #050002; }
        body { margin: 0; background: var(--bg-black); color: var(--love-pink); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; touch-action: none; }
        
        #radar-container {
            position: relative; width: 300px; height: 300px; border: 6px solid var(--love-pink); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px var(--love-glow);
            background: radial-gradient(circle, #300010 0%, #050002 100%); transition: transform 0.2s;
        }
        #scanner-line {
            position: absolute; width: 8px; height: 140px; background: var(--love-pink);
            bottom: 50%; left: calc(50% - 4px); transform-origin: bottom center;
            z-index: 5; box-shadow: 0 0 15px var(--love-pink); border-radius: 4px;
        }
        #degrees { position: absolute; top: -70px; font-size: 5rem; font-weight: bold; text-shadow: 0 0 20px var(--love-pink); }
        
        .heart { position: absolute; pointer-events: none; z-index: 100; font-size: 80px; filter: drop-shadow(0 0 20px var(--love-pink)); animation: fly-up 1.2s forwards; }
        @keyframes fly-up {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; bottom: 10%; }
            20% { opacity: 1; scale: 1.2; }
            100% { transform: translate(-50%, -100vh) scale(3); opacity: 0; bottom: 100%; }
        }

        #overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        button { background: transparent; border: 4px solid var(--love-pink); color: var(--love-pink); padding: 25px 50px; font-size: 1.8rem; font-weight: bold; border-radius: 60px; box-shadow: 0 0 30px var(--love-glow); }
        #label { margin-top: 50px; letter-spacing: 3px; font-weight: bold; font-size: 1.1rem; text-align: center; }
    </style>
</head>
<body onclick="setTarget()">

    <div id="overlay">
        <button onclick="init()">AVVIA RADAR</button>
    </div>

    <div id="degrees">000°</div>
    <div id="radar-container">
        <div id="scanner-line"></div>
    </div>
    <div id="label">PUNTA E TOCCA PER<br>AGGANCIARE IL BERSAGLIO</div>

    <script>
        let audioCtx, nextBeepTime = 0, beepFrequency = 0;
        let isActive = false;
        let targetHeading = 0; // La direzione del bersaglio memorizzata
        let currentRawHeading = 0; // La direzione attuale della bussola

        async function init() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res === 'granted') start();
            } else { start(); }
        }

        function start() {
            document.getElementById('overlay').style.display = 'none';
            isActive = true;
            
            window.addEventListener('deviceorientation', (e) => {
                if (!isActive) return;

                // Safari usa webkitCompassHeading
                let heading = e.webkitCompassHeading || (360 - e.alpha);
                if (heading !== null) {
                    currentRawHeading = heading;
                    
                    // CALCOLO RELATIVO: Calcoliamo la differenza tra la posizione attuale e il bersaglio
                    let relativeHeading = (currentRawHeading - targetHeading + 360) % 360;
                    
                    // L'ago ora punta verso il bersaglio memorizzato
                    document.getElementById('scanner-line').style.transform = `rotate(${-relativeHeading}deg)`;
                    document.getElementById('degrees').innerText = Math.floor(relativeHeading).toString().padStart(3, '0') + "°";
                }

                // Intensità beep basata sull'inclinazione (telefono piatto = scarica)
                let tilt = Math.abs(e.beta); 
                if (tilt < 35) {
                    beepFrequency = Math.max(0, (35 - tilt) / 3); 
                } else {
                    beepFrequency = 0;
                }
            }, true);

            requestAnimationFrame(mainLoop);
        }

        // QUESTA FUNZIONE MEMORIZZA IL BERSAGLIO
        function setTarget() {
            if (!isActive) return;
            
            // Memorizza la direzione attuale come "Punto del Bersaglio"
            targetHeading = currentRawHeading;

            // Effetto visivo feedback
            document.getElementById('radar-container').style.transform = "scale(1.2)";
            setTimeout(() => document.getElementById('radar-container').style.transform = "scale(1)", 200);
            
            document.getElementById('label').innerHTML = "TARGET AGGANCIATO!<br>PUNTAMENTO ATTIVO";
            setTimeout(() => {
                document.getElementById('label').innerHTML = "SEGUI IL SEGNALE...";
            }, 2000);
        }

        function mainLoop() {
            let now = audioCtx ? audioCtx.currentTime : 0;
            if (isActive && beepFrequency > 0.5 && now > nextBeepTime) {
                playBeep(now);
                for(let i=0; i<4; i++) spawnHeart(); // Scarica di cuori giganti
                let interval = 0.7 / (beepFrequency + 0.5); 
                nextBeepTime = now + Math.max(0.08, interval);
            }
            requestAnimationFrame(mainLoop);
        }

        function spawnHeart() {
            const h = document.createElement('div');
            h.className = 'heart'; h.innerHTML = '❤️';
            h.style.left = (Math.random() * 100) + '%';
            h.style.fontSize = (50 + Math.random() * 80) + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1200);
        }

        function playBeep(t) {
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'square'; // Suono più "elettronico"
            osc.frequency.setValueAtTime(1100 + (beepFrequency * 50), t); 
            gain.gain.setValueAtTime(0.2, t);
            gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
            osc.start(t); osc.stop(t + 0.1);
        }
    </script>
</body>
</html>
