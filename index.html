<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soul Scanner XG</title>
    <style>
        :root { --neon: #00ff41; --love: #ff0055; --bg: #050505; }
        body {
            margin: 0; background: var(--bg); color: var(--neon);
            font-family: 'Courier New', monospace; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        #radar-circle {
            position: relative; width: 300px; height: 300px;
            border: 4px solid currentColor; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        #needle {
            position: absolute; width: 8px; height: 140px;
            background: currentColor; bottom: 50%; left: calc(50% - 4px);
            transform-origin: bottom center; z-index: 10;
        }
        #degree-display { font-size: 5rem; font-weight: bold; margin-bottom: 10px; }
        
        body.love-mode { color: var(--love); background: #1a0005; }
        body.love-mode #needle::after {
            content: '❤'; position: absolute; top: -45px; left: -18px;
            font-size: 45px; animation: pulse 0.15s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.3); } }

        .heart {
            position: absolute; pointer-events: none; font-size: 80px; 
            text-shadow: 0 0 30px var(--love); z-index: 100;
            animation: explode 1s forwards ease-out;
        }
        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(2.5); opacity: 0; }
        }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        button {
            padding: 25px 50px; background: transparent; color: var(--neon);
            border: 4px solid var(--neon); font-size: 1.5rem; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body onclick="triggerLock()">

    <div id="overlay">
        <button onclick="startApp()">AVVIA SCANNER</button>
    </div>

    <div id="degree-display">000°</div>
    <div id="radar-circle">
        <div id="needle"></div>
    </div>
    <div id="info" style="margin-top: 30px; letter-spacing: 5px;">BUSSOLA ATTIVA</div>

    <script>
        let audioCtx, isLocked = false, currentAngle = 0, intensity = 0, nextBeep = 0;

        function startApp() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => { if(res === 'granted') init(); });
            } else { init(); }
        }

        function init() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('overlay').style.display = 'none';

            // SISTEMA DI PUNTAMENTO POTENZIATO
            const handleOrientation = (e) => {
                if (!isLocked) {
                    // Cerca il valore Alpha in 3 posti diversi (per coprire PC e diversi Mobile)
                    let alpha = 0;
                    if (e.webkitCompassHeading) {
                        alpha = e.webkitCompassHeading; // iOS
                    } else if (e.alpha !== null) {
                        alpha = e.alpha; // Android / PC Simulator
                        if (e.absolute === false && !e.webkitCompassHeading) {
                            // Se non è assoluta, alcuni browser la invertono
                            alpha = 360 - e.alpha; 
                        }
                    }
                    currentAngle = alpha;
                    document.getElementById('degree-display').innerText = 
                        Math.floor(currentAngle).toString().padStart(3, '0') + "°";
                }
                document.getElementById('needle').style.transform = `rotate(${currentAngle}deg)`;
                
                // Inclinazione (Beta)
                let beta = Math.abs(e.beta || 0);
                intensity = Math.max(0, Math.min(100, (beta - 15) * 3));
            };

            // Ascolta entrambi i tipi di evento per sicurezza
            window.addEventListener('deviceorientation', handleOrientation, true);
            window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            
            requestAnimationFrame(loop);
        }

        function triggerLock() {
            if (!audioCtx || isLocked) return;
            isLocked = true;
            document.body.classList.add('love-mode');
            document.getElementById('info').innerText = "TARGET AGGANCIATO";
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }

        function loop() {
            let now = audioCtx.currentTime;
            if (isLocked && intensity > 10 && now > nextBeep) {
                playBeep(now);
                nextBeep = now + (0.7 - (intensity / 100) * 0.65);
                
                // Cuori Giganti
                let count = Math.floor(intensity / 15);
                for(let i=0; i<count; i++) {
                    const h = document.createElement('div');
                    h.className = 'heart'; h.innerHTML = '❤';
                    h.style.left = '50%'; h.style.top = '50%';
                    h.style.setProperty('--tx', (Math.random() * 800 - 400) + 'px');
                    h.style.setProperty('--ty', (Math.random() * -800 + 200) + 'px');
                    document.body.appendChild(h);
                    setTimeout(() => h.remove(), 1000);
                }
            }
            requestAnimationFrame(loop);
        }

        function playBeep(t) {
            let osc = audioCtx.createOscillator();
            let g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(800 + (intensity * 4), t);
            g.gain.setValueAtTime(0.1, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
            osc.start(t); osc.stop(t + 0.1);
        }
    </script>
</body>
</html>
